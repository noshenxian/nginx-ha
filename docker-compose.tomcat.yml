services:
  gateway:
    build: .
    environment:
      GATEWAY_BIND: 0.0.0.0:8080
      BACKEND_UPSTREAMS: tomcat-a:8080:3,tomcat-b:8080:1
      BACKEND_UPSTREAMS_app: tomcat-a:8080:5,tomcat-b:8080:1
      BACKEND_UPSTREAMS_api: tomcat-a:8080:1,tomcat-b:8080:5
      API_GATEWAY_SECRET: change-me
      LB_STRATEGY: round_robin
      SESSION_STICKY: "true"
      SESSION_STICKY_MODE: cookie
      SESSION_COOKIE_NAME: OPENRESTY_LB_ROUTE
      SESSION_TTL: 3600s
      HEALTH_CHECK_ENABLED: "true"
      HEALTH_CHECK_INTERVAL: 1s
      HEALTH_CHECK_PATH: /healthz.jsp
      HEALTH_CHECK_TIMEOUT: 2s
      HEALTH_CHECK_FAILS: "1"
      HEALTH_CHECK_PASSES: "1"
      PROXY_CONNECT_TIMEOUT: 3s
      PROXY_READ_TIMEOUT: 30s
      PROXY_SEND_TIMEOUT: 30s
      DNS_RESOLVER: "127.0.0.11 ipv6=off valid=10s"
    ports:
      - "18090:8080"
    depends_on:
      - tomcat-a
      - tomcat-b

  tomcat-a:
    image: tomcat:10.1-jdk17-temurin
    hostname: tomcat-a
    volumes:
      - ./examples/tomcat/ROOT:/usr/local/tomcat/webapps/ROOT:ro

  tomcat-b:
    image: tomcat:10.1-jdk17-temurin
    hostname: tomcat-b
    volumes:
      - ./examples/tomcat/ROOT:/usr/local/tomcat/webapps/ROOT:ro
