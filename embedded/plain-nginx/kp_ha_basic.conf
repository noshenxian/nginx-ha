# Plain nginx fallback. This does NOT provide the full KP-HA feature set.
# It supports native nginx upstream load balancing and passive failover only.
#
# Missing compared with OpenResty/Lua version:
# - active health checks
# - cookie/header sticky session generated by gateway
# - /status JSON with health and counters
# - dynamic upstreams from .env/runtime_config.lua

upstream kp_ha_backend_basic {
    server 10.0.0.11:8080 weight=1 max_fails=3 fail_timeout=10s;
    server 10.0.0.12:8080 weight=1 max_fails=3 fail_timeout=10s;
    keepalive 64;

    # Optional native alternatives:
    # ip_hash;
    # hash $remote_addr consistent;
}

server {
    listen 0.0.0.0:8080;
    server_tokens off;

    location = /healthz {
        default_type text/plain;
        return 200 "ok";
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_pass http://kp_ha_backend_basic;
    }
}
