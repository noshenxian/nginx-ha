# Include inside the `http { ... }` block of an existing OpenResty/nginx-with-lua config.
#
# Required modules:
# - ngx_http_lua_module / OpenResty
# - ngx_http_headers_more_filter_module
# - lua-resty-dns
#
# Required variables:
# - BACKEND_UPSTREAMS, for example: 10.0.0.11:8080:1,10.0.0.12:8080:1
# - API_GATEWAY_SECRET

lua_package_path "/opt/kp-ha/lua/?.lua;;";
lua_shared_dict upstream_health 10m;
lua_shared_dict upstream_sessions 10m;
lua_shared_dict upstream_metrics 10m;

resolver 127.0.0.11 ipv6=off valid=10s;

init_worker_by_lua_block {
    require("healthcheck").start()
}

map $http_upgrade $kp_ha_connection_upgrade {
    default upgrade;
    '' close;
}

log_format kp_ha_json escape=json
    '{"time":"$time_iso8601",'
    '"request_id":"$kp_ha_request_id",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"upstream_addr":"$upstream_addr",'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time"}';

upstream kp_ha_backend {
    balancer_by_lua_block {
        require("balancer").balance()
    }
    server 0.0.0.1:1;
    keepalive 64;
}
