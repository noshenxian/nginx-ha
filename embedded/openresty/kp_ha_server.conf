# Include inside the `http { ... }` block after `kp_ha_http.conf`,
# or copy this server block into your existing virtual host.

server {
    listen 0.0.0.0:8080;
    set $kp_ha_request_id "";
    access_log logs/kp-ha-access.log kp_ha_json;

    more_set_headers "Server: KP-HA";

    location = /healthz {
        default_type text/plain;
        return 200 "ok";
    }

    location = /status {
        default_type application/json;
        access_by_lua_block {
            local config = require("runtime_config")
            local expected = config.API_GATEWAY_SECRET
            if not expected or expected == "" then
                ngx.status = ngx.HTTP_INTERNAL_SERVER_ERROR
                ngx.say('{"error":"API_GATEWAY_SECRET is required"}')
                return ngx.exit(ngx.HTTP_INTERNAL_SERVER_ERROR)
            end
            local actual = ngx.var.http_x_api_gateway_secret
            if actual ~= expected then
                ngx.status = ngx.HTTP_UNAUTHORIZED
                ngx.say('{"error":"unauthorized"}')
                return ngx.exit(ngx.HTTP_UNAUTHORIZED)
            end
        }
        content_by_lua_block {
            require("metrics").status()
        }
    }

    location / {
        rewrite_by_lua_block {
            require("request_id").ensure()
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $kp_ha_request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $kp_ha_connection_upgrade;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_pass http://kp_ha_backend;

        log_by_lua_block {
            local metrics = ngx.shared.upstream_metrics
            metrics:incr("requests", 1, 0)
            if ngx.status >= 500 then
                metrics:incr("errors", 1, 0)
            end
            if ngx.ctx.selected_upstream then
                metrics:incr("upstream_requests:" .. ngx.ctx.selected_upstream, 1, 0)
            end
        }
    }
}
